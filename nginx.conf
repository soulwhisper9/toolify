server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Serve tools folder
    location /tools/ {
        try_files $uri $uri/ =404;
    }

    # Serve assets
    location /assets/ {
        try_files $uri =404;
    }

    # Cache static files
    location ~* \.(css|js|ico|png|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
